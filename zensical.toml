[project]
site_name = "Model Diagnostics"
site_description = "Tools for diagnostics and assessment of (machine learning) models"
site_author = "Christian Lorentzen"
site_url = "https://lorentzenchr.github.io/model-diagnostics"
repo_name = "lorentzenchr/model-diagnostics"
repo_url = "https://github.com/lorentzenchr/model-diagnostics"
edit_uri = "blob/master/docs"
copyright = "Copyright &copy; Christian Lorentzen 2022-present"

nav = [
  { "Home" = "index.md" },
  { "Examples" = [
    "examples/index.md",
    { "Regression on Workers' Compensation" = "examples/regression_on_workers_compensation.html" },
    { "Quantile Regression" = "examples/quantile_regression.html" },
    { "Classification" = "examples/classification.html" },
    ]},
  { "API Reference" = [
    "api-reference/index.md",
    "api-reference/model_diagnostics.md",
    "api-reference/calibration.md",
    "api-reference/scoring.md",
    "api-reference/xai.md",
  ]},
  { "Development" = "development.md" },
  { "Release Notes" = "https://github.com/lorentzenchr/model-diagnostics/releases" },
]

extra_javascript = [
  "javascripts/mathjax.js",
  "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js",
]

[project.theme]
variant = "modern"  # "classic"
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  # "navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  # "navigation.instant"
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]] 
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/lorentzenchr/model-diagnostics"

# Note: watch is currently unsupported by zensical
# watch:
#   - src/model_diagnostics/
#   - docs/

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src/model_diagnostics"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
filters = [
  "!^_[^_]",  # this is the default
  "!^test",
]
inherited_members = true
members_order = "alphabetical"
separate_signature = false
show_signature_annotations = false  # type annotations

# Headings
# show_root_heading: true
# show_root_full_path: false

# Other
show_bases = false
show_source = false

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
toc_depth = 3
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
# [project.markdown_extensions.pymdownx.caret]
# [project.markdown_extensions.pymdownx.mark]
# [project.markdown_extensions.pymdownx.tilde]
# [project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji" 
emoji_generator = "zensical.extensions.emoji.to_svg"
